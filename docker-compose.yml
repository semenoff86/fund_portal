services:
  db:
    image: pgvector/pgvector:pg16
    container_name: fund_portal_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fund_portal
    volumes:
      - fund_portal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fund_portal"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fund_portal_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fund_portal
      SECRET_KEY: docker-dev-secret-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      AUDIT_RETENTION_MONTHS: 12
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
      TEMPLATES_DIR: /templates/documents
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen2.5:7b-instruct-q4_K_M
      FASTEMBED_CACHE_DIR: /app/cache/fastembed
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Persist uploaded files (avatars, templates, knowledge, courses) across restarts
      - fund_portal_uploads:/app/uploads
      - fund_portal_fastembed_cache:/app/cache/fastembed
      - ./templates/documents/source:/templates/documents/source
      - ./templates/documents/metadata:/templates/documents/metadata:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_PORT: 8000
    container_name: fund_portal_frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped

volumes:
  fund_portal_pgdata:
  fund_portal_uploads:
  fund_portal_fastembed_cache:
